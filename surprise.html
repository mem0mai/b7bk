<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حب عمري ❤️</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif}
body{background:linear-gradient(135deg,#080808,#160912,#250d1b,#3a1428);color:#fff;overflow-x:hidden}
.container{max-width:1000px;margin:auto;padding:40px 20px;text-align:center}
.title{font-size:60px;font-weight:900;text-shadow:0 0 20px #ff4f9a}
.date{margin:20px 0;font-size:24px}
.counter{display:grid;grid-template-columns:repeat(4,1fr);gap:15px;margin:30px 0}
.box,.message,.player{
background:rgba(255,255,255,.08);
padding:20px;
border-radius:20px;
backdrop-filter:blur(10px);
box-shadow:0 0 20px rgba(255,79,154,.15);
}
.box span{display:block;font-size:42px;font-weight:900}
.heartimg{
width:min(75vw,300px);
height:min(75vw,300px);
object-fit:cover;
clip-path:path('M128 230 C20 160 0 90 0 50 C0 10 30 0 60 0 C95 0 115 25 128 45 C141 25 161 0 196 0 C226 0 256 10 256 50 C256 90 236 160 128 230 Z');
margin:25px auto;
display:block;
animation:heartbeat 2s infinite;
filter:drop-shadow(0 0 20px rgba(255,79,154,.5));
}
.message{font-size:26px;line-height:2;min-height:130px}
audio{
width:100%;
border-radius:15px;
filter:hue-rotate(310deg) saturate(1.5);
}
.cursor{animation:blink .8s infinite}
@keyframes blink{50%{opacity:0}}
@keyframes heartbeat{
0%{transform:scale(1)}
25%{transform:scale(1.08)}
50%{transform:scale(1)}
75%{transform:scale(1.08)}
100%{transform:scale(1)}
}
.hearts{position:fixed;inset:0;pointer-events:none}
.heart{position:absolute;animation:float 10s linear infinite}
@keyframes float{from{transform:translateY(100vh)}to{transform:translateY(-100px)}}
@media(max-width:700px){
.counter{grid-template-columns:repeat(2,1fr)}
.title{font-size:42px}
.message{font-size:20px}
.box span{font-size:32px}
.container{padding:20px 10px}
}
</style>
</head>
<body>
<div class="hearts" id="hearts"></div>
<div class="container">
<h1 class="title">❤️ حب عمري ❤️</h1>
<div class="date">📅 تاريخ أول يوم وبداية حياتي<br>16 أبريل 2025</div>

<div class="counter">
<div class="box"><span id="days"></span>يوم</div>
<div class="box"><span id="hours"></span>ساعة</div>
<div class="box"><span id="minutes"></span>دقيقة</div>
<div class="box"><span id="seconds"></span>ثانية</div>
</div>

<img src="photo.jpg.jpg" class="heartimg">

<div class="message"><span id="typed"></span><span class="cursor">|</span></div>

<div class="player" style="margin-top:20px">
<audio id="player" controls autoplay>
<source src="song.mp3.mp3" type="audio/mpeg">
</audio>
</div>
</div>

<script>
const startDate=new Date("2025-04-16T00:00:00");
function update(){
 let diff=new Date()-startDate;
 document.getElementById('days').textContent=Math.floor(diff/86400000);
 document.getElementById('hours').textContent=Math.floor(diff%86400000/3600000);
 document.getElementById('minutes').textContent=Math.floor(diff%3600000/60000);
 document.getElementById('seconds').textContent=Math.floor(diff%60000/1000);
}
setInterval(update,1000);update();

const txt="كل لحظة مرت وأنتي جنبي هي أجمل أيام عمري. أنتي السند، والضحكة، والحياة اللي بتمناها دايماً. ❤️";
let i=0;
const t=window.addEventListener('load',()=>{
const p=document.getElementById('player');
p.play().catch(()=>{});
});

setInterval(()=>{
document.getElementById('typed').innerHTML+=txt.charAt(i++);
if(i>=txt.length) clearInterval(t);
},70);

window.addEventListener('load',()=>{
const p=document.getElementById('player');
p.play().catch(()=>{});
});

setInterval(()=>{
 let h=document.createElement('div');
 h.className='heart'; h.innerHTML='❤️';
 h.style.left=Math.random()*100+'%';
 h.style.fontSize=(15+Math.random()*25)+'px';
 document.getElementById('hearts').appendChild(h);
 setTimeout(()=>h.remove(),10000);
},500);
</script>
</body>
</html>
