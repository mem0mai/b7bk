<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حب عمري ❤️</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif}
body{height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#080808,#160912,#250d1b,#3a1428);color:#fff}
.card{width:90%;max-width:420px;padding:35px;border-radius:25px;background:rgba(255,255,255,.08);backdrop-filter:blur(10px);text-align:center}
h1{font-weight:900;margin-bottom:15px}
p{margin-bottom:15px}
input{width:100%;padding:12px;margin:8px 0;border:none;border-radius:12px;text-align:center}
button{padding:12px 25px;border:none;border-radius:12px;background:#b91c5c;color:#fff;cursor:pointer}
#error{margin-top:10px}
</style>
</head>
<body>
<div class="card">
<h1>❤️ حب عمري ❤️</h1>
<p>اكتبي تاريخ أول يوم اتكلمنا فيه</p>
<input id="day" type="number" placeholder="اليوم">
<input id="month" type="number" placeholder="الشهر">
<button onclick="login()">دخول</button>
<div id="error"></div>
</div>
<script>
function login(){
 const d=document.getElementById('day').value;
 const m=document.getElementById('month').value;
 if(d=='16' && m=='4'){window.location='surprise.html';}
 else{document.getElementById('error').innerText='حاولي تفتكري اليوم المميز ❤️';}
}
</script>
</body>
</html>
